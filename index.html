<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>VapEmbed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#06070b;
  --panel:#10131c;
  --panel2:#151927;
  --border:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#8f96ab;
  --accent:#e50914;
  --accent2:#ff3341;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,sans-serif;
  min-height:100vh;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top left, rgba(229,9,20,.14), transparent 30%),
  radial-gradient(circle at bottom right, rgba(255,255,255,.03), transparent 30%);
  pointer-events:none;
}

.container{
  width:min(1200px,92%);
  margin:auto;
  padding:50px 0;
}

.hero{
  text-align:center;
  margin-bottom:40px;
}

.hero h1{
  font-size:clamp(2.5rem,6vw,5rem);
  font-weight:800;

  background:linear-gradient(135deg,#fff 30%,#ff3341 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  margin-bottom:15px;
}

.hero p{
  color:var(--muted);
  max-width:700px;
  margin:auto;
  line-height:1.7;
}

.grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:25px;
}

@media(max-width:980px){

  .grid{
    grid-template-columns:1fr;
  }

}

.card{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:28px;
  padding:28px;
}

.section{
  margin-bottom:28px;
}

.section-title{
  font-size:11px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:16px;
  font-weight:700;
}

.field{
  margin-bottom:16px;
}

.field label{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  color:#d9dbe3;
}

.input,
.select{
  width:100%;
  height:52px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#0b0e14;
  color:#fff;
  padding:0 16px;
  outline:none;
  font-size:14px;
}

.input:focus,
.select:focus{
  border-color:rgba(229,9,20,.5);
  box-shadow:0 0 0 4px rgba(229,9,20,.12);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.hidden{
  display:none;
}

.subtitle-item{
  background:#0b0e14;
  border:1px solid var(--border);
  padding:15px;
  border-radius:18px;
  margin-bottom:15px;
}

.add-sub{
  width:100%;
  height:50px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.generate{
  width:100%;
  height:58px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  margin-top:10px;
}

.preview{
  aspect-ratio:16/9;
  border-radius:22px;
  overflow:hidden;
  border:1px solid var(--border);
  background:#000;
}

.preview iframe{
  width:100%;
  height:100%;
  border:none;
}

.output{
  margin-top:20px;
}

.output-box{
  background:#0b0e14;
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:15px;
}

.output-head{
  padding:15px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
}

.output-code{
  padding:18px;
  color:#8effb2;
  font-family:monospace;
  font-size:12px;
  line-height:1.8;
  word-break:break-all;
}

.copy{
  border:none;
  background:rgba(255,255,255,.06);
  color:#fff;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
}

.remove-sub{
  width:100%;
  height:42px;
  border:none;
  border-radius:12px;
  background:rgba(255,0,0,.12);
  color:#ff7070;
  margin-top:10px;
  cursor:pointer;
  font-weight:700;
}

</style>
</head>
<body>

<div class="container">

  <div class="hero">

    <h1>VapEmbed</h1>

    <p>
      Generador avanzado para VidAPI/Vaplayer con soporte para múltiples subtítulos personalizados.
    </p>

  </div>

  <div class="grid">

    <!-- LEFT -->

    <div class="card">

      <div class="section">

        <div class="section-title">
          Media
        </div>

        <div class="field">
          <label>Tipo</label>

          <select class="select" id="type">
            <option value="movie">Película</option>
            <option value="tv">Serie</option>
          </select>
        </div>

        <div class="field">
          <label>IMDB o TMDB ID</label>

          <input
          type="text"
          class="input"
          id="id"
          placeholder="tt23779058 o 205715"
          />
        </div>

        <div id="tvFields" class="hidden">

          <div class="row">

            <div class="field">
              <label>Temporada</label>

              <input
              type="number"
              class="input"
              id="season"
              value="1"
              />
            </div>

            <div class="field">
              <label>Episodio</label>

              <input
              type="number"
              class="input"
              id="episode"
              value="1"
              />
            </div>

          </div>

        </div>

      </div>

      <!-- PLAYER -->

      <div class="section">

        <div class="section-title">
          Player
        </div>

        <div class="field">
          <label>Título</label>

          <input
          type="text"
          class="input"
          id="title"
          placeholder="Naruto Shippuden"
          />
        </div>

        <div class="field">
          <label>Poster URL</label>

          <input
          type="text"
          class="input"
          id="poster"
          placeholder="https://image.jpg"
          />
        </div>

        <div class="field">
          <label>Color</label>

          <input
          type="color"
          class="input"
          id="color"
          value="#e50914"
          style="padding:5px;"
          />
        </div>

      </div>

      <!-- SUBS -->

      <div class="section">

        <div class="section-title">
          Subtítulos
        </div>

        <div id="subsContainer"></div>

        <button class="add-sub" onclick="addSubtitle()">
          + Agregar subtítulo
        </button>

      </div>

      <button class="generate" onclick="generatePlayer()">
        GENERAR PLAYER
      </button>

    </div>

    <!-- RIGHT -->

    <div>

      <div class="preview">
        <iframe
        id="preview"
        allowfullscreen
        allow="autoplay; fullscreen"
        ></iframe>
      </div>

      <div class="output">

        <div class="output-box">

          <div class="output-head">
            URL FINAL

            <button class="copy" onclick="copyText('urlOutput')">
              Copiar
            </button>

          </div>

          <div class="output-code" id="urlOutput"></div>

        </div>

        <div class="output-box">

          <div class="output-head">
            IFRAME

            <button class="copy" onclick="copyText('iframeOutput')">
              Copiar
            </button>

          </div>

          <div class="output-code" id="iframeOutput"></div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

const typeSelect = document.getElementById('type');
const tvFields = document.getElementById('tvFields');

typeSelect.addEventListener('change', () => {

  if(typeSelect.value === 'tv'){
    tvFields.classList.remove('hidden');
  }else{
    tvFields.classList.add('hidden');
  }

});

let subIndex = 0;

function addSubtitle(){

  subIndex++;

  const container = document.getElementById('subsContainer');

  const div = document.createElement('div');

  div.className = 'subtitle-item';

  div.innerHTML = `

    <div class="field">
      <label>Nombre del subtítulo</label>

      <input
      type="text"
      class="input sub-label"
      placeholder="Español Latino"
      />
    </div>

    <div class="field">
      <label>URL del subtítulo</label>

      <input
      type="text"
      class="input sub-url"
      placeholder="https://example.com/sub.vtt"
      />
    </div>

    <div class="field">
      <label>Idioma</label>

      <input
      type="text"
      class="input sub-lang"
      placeholder="es"
      />
    </div>

    <button class="remove-sub">
      Eliminar subtítulo
    </button>

  `;

  div.querySelector('.remove-sub').onclick = () => {
    div.remove();
  };

  container.appendChild(div);

}

addSubtitle();

function generatePlayer(){

  const type = document.getElementById('type').value;
  const id = document.getElementById('id').value.trim();

  if(!id){
    alert('Ingresa un IMDB o TMDB ID');
    return;
  }

  let url = '';

  if(type === 'movie'){

    url = `https://vaplayer.ru/embed/movie/${id}`;

  }else{

    const season = document.getElementById('season').value || 1;
    const episode = document.getElementById('episode').value || 1;

    url = `https://vaplayer.ru/embed/tv/${id}/${season}/${episode}`;

  }

  const params = new URLSearchParams();

  const title = document.getElementById('title').value.trim();
  const poster = document.getElementById('poster').value.trim();
  const color = document.getElementById('color').value;

  if(title){
    params.set('title', title);
  }

  if(poster){
    params.set('poster', poster);
  }

  if(color){
    params.set('primaryColor', color);
  }

  const subs = document.querySelectorAll('.subtitle-item');

  subs.forEach((sub, index) => {

    const label = sub.querySelector('.sub-label').value.trim();
    const subUrl = sub.querySelector('.sub-url').value.trim();
    const lang = sub.querySelector('.sub-lang').value.trim();

    if(subUrl){

      params.append('sub_url', subUrl);

      if(label){
        params.append('sub_label', label);
      }

      if(lang){
        params.append('sub_lang', lang);
      }

    }

  });

  if(params.toString()){
    url += '?' + params.toString();
  }

  document.getElementById('preview').src = url;

  document.getElementById('urlOutput').textContent = url;

  document.getElementById('iframeOutput').textContent =
`<iframe
  src="${url}"
  width="100%"
  height="100%"
  frameborder="0"
  allowfullscreen
  allow="autoplay; fullscreen">
</iframe>`;

}

function copyText(id){

  const text = document.getElementById(id).textContent;

  navigator.clipboard.writeText(text);

}

</script>

</body>
</html>
